{% comment %}
  this just wraps the webp converter
{% endcomment %}
{% assign original_url = include.src | relative_url %}
{% assign webp_url = original_url | replace: '.jpg', '.webp' | replace: '.jpeg', '.webp' | replace: '.png', '.webp' %}

<picture
  {% unless include.disable_contents %}
    style="display: contents;"
  {% endunless %}
>
  <source srcset="{{ webp_url }}" type="image/webp">

  <img
    src="{{ original_url }}"
    alt="{{ include.alt | default: '' }}"
    class="{{ include.class }}"
    {% if include.draggable %}
      draggable="{{ include.draggable }}"
    {% endif %}
    loading="{{ include.loading | default: 'lazy' }}"
    {{ include.custom_attrs }}
  >
</picture>
