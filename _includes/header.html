<header class="header">
  {% if page.url != '/' %}
  <a href="{{ '/' | relative_url }}" class="header__logo-button">
    <img
      id="header__logo"
      src="{{ '/assets/images/header/sandy.svg' | relative_url}}"
    />
  </a>
  {% endif %}

  <div class="header__items">
    <a href="{{ '/work' | relative_url }}">work</a>

    <button
      role="button"
      id="menu-toggle-button"
      data-close-img="{{ '/assets/images/header/close.svg' | relative_url }}"
      data-open-img="{{ '/assets/images/header/menu.svg' | relative_url }}"
    >
      <img
        src="{{ '/assets/images/header/menu.svg' | relative_url }}"
        id="menu-toggle-image"
      />
    </button>
  </div>
</header>

<script>
  const header = document.querySelector(".header");
  const root = document.documentElement;
  
  let lastScrollY = window.scrollY;
  let headerHeight = header.offsetHeight;

  window.addEventListener("resize", () => {
    headerHeight = header.offsetHeight;
    // update immediately if at the top
    if (window.scrollY <= 0) {
      root.style.setProperty('--header-offset', `${headerHeight}px`);
    }
  });

  root.style.setProperty('--header-offset', `${headerHeight}px`);

  window.addEventListener(
    "scroll",
    () => {
      const currentScrollY = window.scrollY;

      if (currentScrollY <= 0) {
        header.classList.remove("header--hidden");
        root.style.setProperty('--header-offset', `${headerHeight}px`);
        return;
      }

      if (currentScrollY > lastScrollY) {
        // scrolling down
        header.classList.add("header--hidden");
        root.style.setProperty('--header-offset', '0px');
      } else {
        // scrolling up
        header.classList.remove("header--hidden");
        root.style.setProperty('--header-offset', `${headerHeight}px`);
      }

      lastScrollY = currentScrollY;
    },
    { passive: true }
  );
</script>
